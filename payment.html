<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:350px;
margin:auto;
padding:20px;
border-radius:10px;
}

input,select{
width:90%;
padding:10px;
margin:10px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Payment Page</h1>

<div class="container">

<h3 id="amount"></h3>

<select>
<option>Credit Card</option>
<option>Debit Card</option>
<option>UPI</option>
<option>Cash on Delivery</option>
</select>

<input type="text" placeholder="Card / UPI Number">

<input type="text" placeholder="Name on Card">

<input type="text" placeholder="Expiry Date">

<button onclick="payNow()">Pay Now</button>

</div>

<script>

let total = localStorage.getItem("totalPrice");

document.getElementById("amount").innerText = "Total Amount: ₹" + total;

function payNow(){

alert("Payment Successful!");

localStorage.removeItem("cart");

window.location.href="success.html";

}

</script>

</body>
</html>
