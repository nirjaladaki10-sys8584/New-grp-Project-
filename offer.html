<!DOCTYPE html>
<html>
<head>
<title>Mobile Offers</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.offer-card{
background:white;
width:250px;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.offer-card img{
width:100%;
height:200px;
object-fit:cover;
}

.price{
color:red;
font-size:18px;
}

.old-price{
text-decoration:line-through;
color:gray;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#e65c00;
}

.cart-link{
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🔥 Mobile Special Offers</h1>

<div class="container">

<div class="offer-card">
<img src="images/iphone15.jpg">
<h3>iPhone 15</h3>
<p class="old-price">80,000</p>
<p class="price">72,000 (10% OFF)</p>
<button onclick="addToCart('iPhone 15',72000)">Add to Cart</button>
</div>

<div class="offer-card">
<img src="/images/samsung 23.jpg">
<h3>Samsung S23</h3>
<p class="old-price">72,000</p>
<p class="price">69,000 (10% OFF)</p>
<button onclick="addToCart('Samsung S24',69000)">Add to Cart</button>
</div>

<div class="offer-card">
<img src="https://via.placeholder.com/200">
<h3>Samsung galaxy A54</h3>
<p class="old-price">39,000</p>
<p class="price">30,000 (10% OFF)</p>
<button onclick="addToCart('samsung galaxy A54',30000)">Add to Cart</button>
</div>

<div class="offer-card">
<img src="images/Google pixel 8.jpg">
<h3>google pixel 8</h3>
<p class="old-price">75,000</p>
<p class="price">67,000 (10% OFF)</p>
<button onclick="addToCart('google pixel 8',67000)">Add to Cart</button>
</div>

</div>

<a class="cart-link" href="cart.html">🛒 Go To Cart</a>

<script>

function addToCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:name,
price:price
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product Added To Cart!");

}

</script>

</body>
</html>
